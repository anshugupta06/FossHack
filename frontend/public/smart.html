<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayMatch | Smart Chores</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="smart.css">
</head>
<body>

<div class="glass-shell">

    <div class="header">
        <h1>Smart Chore <span>Allocator</span></h1>
        <p>Neural Task Rotation & Fairness Engine</p>
    </div>

    <!-- INPUT -->
    <div class="input-card">

        <div class="input-row">
            <input type="text" id="name1" placeholder="User A Name">
            <input type="text" id="name2" placeholder="User B Name">
        </div>

        <textarea id="chores"
        placeholder="Enter chores (e.g. Dishes, Vacuum, Bathroom, Trash)"></textarea>

        <div class="input-row">
            <div class="stat-box">
                <label>User A Cleanliness</label>
                <input type="number" id="clean1" min="1" max="10" placeholder="1-10">
            </div>
            <div class="stat-box">
                <label>User B Cleanliness</label>
                <input type="number" id="clean2" min="1" max="10" placeholder="1-10">
            </div>
        </div>

        <button class="glow-btn" onclick="generateChores()">
            ⚡ Generate Smart Schedule
        </button>
    </div>

    <!-- FAIRNESS METER -->
    <div class="ai-dashboard" id="dashboard" style="display:none;">
        <div class="fairness-meter">
            <span>Workload Balance</span>
            <div class="meter-bar">
                <div id="balanceFill" class="fill"></div>
            </div>
            <small id="balanceText">Calculating...</small>
        </div>
    </div>

    <!-- PIE CHART -->
    <div id="chartDashboard" style="display:none;">
        <div class="chart-container">
            <canvas id="choreChart"></canvas>
        </div>
    </div>

    <!-- OUTPUT -->
    <div id="output" class="output-box">
        <div class="placeholder-text">Waiting for input...</div>
    </div>

    <!-- DOWNLOAD -->
    <button class="export-btn" onclick="downloadChorePlan()">
        📥 Download Plan
    </button>

</div>

<script src="smart.js"></script>

</body>
</html>
