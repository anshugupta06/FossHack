<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agreement Architect | StayMatch</title>
    <link rel="stylesheet" href="agreement.css">
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>Agreement Architect 🧠</h1>
        <p class="subtitle">Neural Contract Synthesis Engine</p>
    </div>

    <div class="form-container">
        <div class="form-grid">
            <div class="input-group">
                <label>Primary Resident</label>
                <input id="name1" placeholder="Your Full Name">
            </div>
            <div class="input-group">
                <label>Roommate Candidate</label>
                <input id="name2" placeholder="Roommate Full Name">
            </div>
            <div class="input-group full-width">
                <label>Total Monthly Rent ($)</label>
                <input id="rent" type="number" placeholder="e.g. 1200">
            </div>

            <div class="input-group">
                <label>Sleep Frequency (1-10)</label>
                <input id="sleep" type="number" min="1" max="10">
            </div>
            <div class="input-group">
                <label>Cleanliness (1-10)</label>
                <input id="clean" type="number" min="1" max="10">
            </div>
            <div class="input-group full-width">
                <label>Noise Tolerance (1-10)</label>
                <input id="noise" type="number" min="1" max="10">
            </div>

            <div class="input-group full-width">
                <label>Specific House Rules</label>
                <textarea id="rules" placeholder="Enter custom rules..."></textarea>
            </div>
            <div class="input-group full-width">
                <label>Chore Distribution Strategy</label>
                <textarea id="chores" placeholder="Who does what?"></textarea>
            </div>
        </div>

        <div class="action-buttons">
            <button onclick="prefillData()" class="secondary-btn">⚡ Use My Preferences</button>
            <button class="generate-btn" onclick="generateAgreement()">Synthesize Agreement</button>
        </div>
    </div>

    <div class="output-section">
        <div class="terminal-header">
            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            <span class="terminal-title">Generated_Agreement.log</span>
        </div>
        <pre id="output"></pre>
    </div>
    <div class="analysis-bar">
    <div class="meter-container">
        <label>Agreement Strength</label>
        <div class="meter-bg">
            <div id="strengthFill" class="meter-fill" style="width: 0%"></div>
        </div>
        <span id="strengthText">Waiting for synthesis...</span>
    </div>
    
    <div class="ai-controls">
        <button onclick="fixAgreementIssues()" class="mini-btn pulse" id="fixBtn" style="display:none;">
            ✨ Auto-Fix Conflicts
        </button>
    </div>
</div>
    <button onclick="downloadAgreement()" class="download-btn">📥 Download Signed PDF (.txt)</button>
</div>

<script src="agreement.js"></script>
</body>
</html>
