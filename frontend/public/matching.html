<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayMatch | Neural Sync</title>
    <link rel="stylesheet" href="matching.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="matching.js" defer></script>
</head>
<body>

<div class="glass-shell">
    <header class="matching-header">
        <div class="back-link" style="cursor:pointer; opacity:0.6; margin-bottom:10px;" onclick="window.location.href='dashboard.html'">
            ← Back to Dashboard
        </div>
        <h1>Neural Compatibility <span>Sync</span></h1>
        <p style="opacity:0.8;">Advanced lifestyle frequency matching for your perfect home.</p>
    </header>

    <div class="main-layout">
        <aside class="controls">
            <div class="input-card">
                <div class="trait">
                    <label>Sleep Cycle <span id="val-sleep">5</span></label>
                    <input type="range" id="sleep" min="1" max="10" value="5" oninput="updateVal('sleep')">
                </div>
                <div class="trait">
                    <label>Cleanliness <span id="val-clean">5</span></label>
                    <input type="range" id="clean" min="1" max="10" value="5" oninput="updateVal('clean')">
                </div>
                <div class="trait">
                    <label>Noise Tolerance <span id="val-noise">5</span></label>
                    <input type="range" id="noise" min="1" max="10" value="5" oninput="updateVal('noise')">
                </div>
                <div class="trait">
                    <label>Neural Study <span id="val-study">5</span></label>
                    <input type="range" id="study" min="1" max="10" value="5" oninput="updateVal('study')">
                </div>
                <div class="trait">
                    <label>Social Frequency <span id="val-social">5</span></label>
                    <input type="range" id="social" min="1" max="10" value="5" oninput="updateVal('social')">
                </div>

                <div class="trait">
                    <label>Smoking Preference</label>
                    <select id="smoking">
                        <option value="0">Strict Non-Smoker</option>
                        <option value="1">Smoker Friendly</option>
                    </select>
                </div>

                <div class="trait">
                    <label>Pet Friendly</label>
                    <select id="pets">
                        <option value="1">Pet Loving</option>
                        <option value="0">No Pets</option>
                    </select>
                </div>

                <button type="button" class="sync-btn" onclick="findMatches()">
                    Initialize Neural Sync
                </button>
            </div>
        </aside>

        <main class="results-area">
            <h2 style="font-weight: 300; margin-bottom: 25px;">Optimal Compatibility Matches</h2>
            <div id="results" class="results-grid">
                <div class="placeholder-msg" style="text-align:center; padding:60px; opacity:0.5;">
                    Adjust your preferences and tap <b>Initialize Sync</b> to begin.
                </div>
            </div>
        </main>
    </div>
</div>

<div id="chartModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(15, 15, 25, 0.98); backdrop-filter:blur(20px); padding:30px; border-radius:30px; border:1px solid var(--primary); z-index:1000; width:90%; max-width:480px;">
    <h3 id="modalName" style="text-align:center; margin-bottom:15px;"></h3>
    <canvas id="compatibilityChart"></canvas>
    <button onclick="document.getElementById('chartModal').style.display='none'" style="margin-top:20px; width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; border-radius:12px; cursor:pointer;">Close Analysis</button>
</div>

</body>
</html>
